app = "smart-server-room-backend"

kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile"
  context = ".."

[env]
  PYTHONUNBUFFERED = "1"
  PORT = "8765"

[[services]]
  internal_port = 8765
  protocol = "tcp"

  [services.concurrency]
    type = "connections"
    soft_limit = 25
    hard_limit = 30

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.tcp_checks]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    restart_limit = 0
